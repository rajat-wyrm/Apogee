services:
  backend:
    image: apogee-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apogee-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - apogee-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M

  frontend:
    image: apogee-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: apogee-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - apogee-net

networks:
  apogee-net:
    driver: bridge
